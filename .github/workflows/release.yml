name: Release

# release-please 驱动：往 main 推规范化提交(feat/fix/...) → 自动维护一个 Release PR；
# 合并该 PR → 自动 bump 三处版本 + 写 CHANGELOG + 打 tag + 建 GitHub Release，
# 随后 build 任务编译各平台、上传带签名的安装包与 latest.json。
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # 仅在 release-please 真正建出 release 时跑（即 Release PR 被合并那次）。
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest   # Intel (x86_64)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      # pnpm version comes from package.json `packageManager` (single source);
      # specifying `version:` here too makes action-setup@v4 error on a mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: desktop

      # 把产物上传到 release-please 刚建好的（非 draft）release。
      - name: Build & upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 给更新包签名 + 生成 latest.json（应用内更新所需）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseDraft: false   # 必须与 release-please 建的已发布 release 状态一致
          args: ${{ matrix.args }}

      # 额外产出 `uf-ost` MCP 服务器二进制，按 target triple 命名上传到同一 release，
      # 供 AI agent 免 cargo build 直接下载（README 的 MCP 安装说明引用这些 asset）。
      - name: Build & upload uf-ost MCP binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo build --release --locked --bin uf-ost ${{ matrix.args }}
          triple=$(echo "${{ matrix.args }}" | sed -n 's/.*--target \([^ ]*\).*/\1/p')
          if [ -z "$triple" ]; then
            triple=$(rustc -vV | sed -n 's/host: //p')
            dir="target/release"
          else
            dir="target/$triple/release"
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$dir/uf-ost.exe" "uf-ost-$triple.exe"
            gh release upload "${{ needs.release-please.outputs.tag_name }}" "uf-ost-$triple.exe" --clobber
          else
            cp "$dir/uf-ost" "uf-ost-$triple"
            gh release upload "${{ needs.release-please.outputs.tag_name }}" "uf-ost-$triple" --clobber
          fi
